<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Automatizado Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Hospital Automatizado <span>Simulação em Tempo Real</span></h1>
        <div class="controls">
            <button id="btnToggleSim" class="btn active">Pausar Simulação</button>
            <div class="stats">
                <div>Pacientes Atendidos: <span id="statAtendidos">0</span></div>
            </div>
        </div>
    </header>

    <main class="dashboard-grid">
        <!-- Coluna Esquerda: Triagem -->
        <section class="panel glass">
            <div class="panel-header">
                <h2>Triagem <span>(Fila de Espera)</span></h2>
                <div class="badge" id="triagemCount">0</div>
            </div>
            <div class="queue-container" id="filaTriagem">
                <!-- Pacientes aparecerão aqui -->
            </div>
        </section>

        <!-- Coluna Central: Maqueiro e Consultórios -->
        <div class="center-col">
            <!-- Maqueiro -->
            <section class="panel glass maqueiro-panel">
                <div class="panel-header">
                    <h2>Maqueiro Compartilhado</h2>
                </div>
                <div class="maqueiro-status" id="maqueiroStatus">
                    <div class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 2.1l4 4-4 4"/>
                            <path d="M3 12.2v-2a4 4 0 0 1 4-4h13.8"/>
                            <path d="M7 21.9l-4-4 4-4"/>
                            <path d="M21 11.8v2a4 4 0 0 1-4 4H3.2"/>
                        </svg>
                    </div>
                    <div class="info">
                        <h3 id="maqueiroStateLabel">LIVRE</h3>
                        <p id="maqueiroActionLabel">Aguardando tarefas...</p>
                    </div>
                </div>
            </section>

            <!-- Consultórios -->
            <div class="consultorios-grid">
                <section class="panel glass consultorio" id="c1-panel">
                    <div class="panel-header">
                        <h2>Consultório 1</h2>
                        <div class="status-indicator" id="c1-indicator">LIVRE</div>
                    </div>
                    <div class="patient-slot" id="c1-slot">
                        <p class="empty-text">Vazio</p>
                    </div>
                </section>
                
                <section class="panel glass consultorio" id="c2-panel">
                    <div class="panel-header">
                        <h2>Consultório 2</h2>
                        <div class="status-indicator" id="c2-indicator">LIVRE</div>
                    </div>
                    <div class="patient-slot" id="c2-slot">
                        <p class="empty-text">Vazio</p>
                    </div>
                </section>
            </div>
        </div>

        <!-- Coluna Direita: Recuperação -->
        <section class="panel glass recuperacao-panel">
            <div class="panel-header">
                <h2>Sala de Recuperação</h2>
                <div class="badge" id="leitosCount">0 / 2</div>
            </div>
            <div class="beds-container">
                <div class="bed glass-dark" id="bed-1">
                    <div class="bed-label">Leito 1</div>
                    <div class="patient-slot" id="recup-slot-1">
                        <p class="empty-text">Livre</p>
                    </div>
                </div>
                <div class="bed glass-dark" id="bed-2">
                    <div class="bed-label">Leito 2</div>
                    <div class="patient-slot" id="recup-slot-2">
                        <p class="empty-text">Livre</p>
                    </div>
                </div>
            </div>
            <div class="logs-container">
                <h3>Últimas Ações</h3>
                <ul id="actionLogs">
                    <!-- Logs aparecerão aqui -->
                </ul>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
